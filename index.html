<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nandi Housing — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --maroon:#7a1a14;--maroon2:#9e2018;
  --green:#0a6b6f;--green2:#0d8a8f;
  --amber:#b8692e;--amber2:#d4803a;
  --blue:#2e5d93;--blue2:#3a72b0;
  --red:#c62828;
  --bg:#f4f0eb;--card:#ffffff;
  --text:#1a1a2e;--text-light:#6b6b7a;
  --border:#e5e0d8;--border2:#d5cfc5;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --radius:12px;--font:'Inter',sans-serif;--serif:'DM Serif Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none;background:none}

/* NAV */
.nav{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;background:var(--maroon);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-brand{font-family:var(--serif);color:#fff;font-size:18px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-crumb{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.7);overflow:hidden}
.nav-crumb .sep{opacity:.5}
.nav-crumb .active{color:#fff;font-weight:500}
.nav-back{color:rgba(255,255,255,.8);font-size:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 12px;transition:.15s;flex-shrink:0}
.nav-back:hover{background:rgba(255,255,255,.2)}
.nav-export{color:rgba(255,255,255,.8);font-size:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;flex-shrink:0}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center}
.loading-box{background:white;border-radius:16px;padding:40px 48px;text-align:center;width:320px}
.spinner{width:44px;height:44px;border:4px solid #e5e0d8;border-top-color:var(--maroon);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.loading-sub{font-size:12px;color:var(--text-light)}
.ldots::after{content:'...';animation:dots 1.2s steps(4) infinite}
@keyframes dots{0%,25%{content:'.'}50%{content:'..'}75%,100%{content:'...'}}

/* HOME */
.home-view{max-width:960px;margin:0 auto;padding:64px 24px 40px}
.home-hero{text-align:center;margin-bottom:56px}
.home-hero h1{font-family:var(--serif);font-size:40px;color:var(--text);line-height:1.2;margin-bottom:12px}
.home-hero p{font-size:16px;color:var(--text-light)}
.dept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:840px;margin:0 auto}
.dept-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);border-top:4px solid var(--maroon);padding:36px 28px;cursor:pointer;transition:transform .18s,box-shadow .18s;text-align:center}
.dept-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.dept-card.dept-dm{border-top-color:var(--blue)}
.dept-card.dept-lr{border-top-color:var(--green)}
.dept-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;background:rgba(122,26,20,.1)}
.dept-icon svg{width:28px;height:28px;stroke:var(--maroon)}
.dept-dm .dept-icon{background:rgba(46,93,147,.1)}
.dept-dm .dept-icon svg{stroke:var(--blue)}
.dept-lr .dept-icon{background:rgba(10,107,111,.1)}
.dept-lr .dept-icon svg{stroke:var(--green)}
.dept-card h2{font-family:var(--serif);font-size:26px;margin-bottom:4px}
.dept-card p{font-size:13px;color:var(--text-light);margin-bottom:20px}
.dept-tag{display:inline-block;background:rgba(122,26,20,.08);color:var(--maroon);font-size:11px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:20px}
.dept-dm .dept-tag{background:rgba(46,93,147,.08);color:var(--blue)}
.dept-lr .dept-tag{background:rgba(10,107,111,.08);color:var(--green)}

/* PERIOD BAR */
.period-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:56px;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.mode-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.mode-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text-light);transition:.15s;white-space:nowrap}
.mode-tab.active{background:var(--maroon);color:#fff}
.period-pills{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.period-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;color:var(--text-light);background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:.15s;white-space:nowrap;line-height:1.3;text-align:center}
.period-pill:hover{border-color:var(--maroon);color:var(--maroon)}
.period-pill.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
.pill-sub{display:block;font-size:10px;opacity:.75}
.gen-btn{background:var(--maroon);color:#fff;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap;flex-shrink:0}
.gen-btn:hover:not(:disabled){background:var(--maroon2)}
.gen-btn:disabled{opacity:.45;cursor:not-allowed}
.gen-btn.cached{background:var(--green)}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:24px;max-width:1200px;margin:0 auto}
@media(max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.card-grid{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:8px}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.card-empty{cursor:default;opacity:.55}
.card-empty:hover{transform:none;box-shadow:none}
.card-hd{display:flex;align-items:center;justify-content:space-between}
.card-num{font-family:var(--serif);font-size:28px;color:var(--border2);line-height:1}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-green{background:rgba(10,107,111,.12);color:var(--green)}
.b-amber{background:rgba(184,105,46,.12);color:var(--amber)}
.b-red{background:rgba(198,40,40,.12);color:var(--red)}
.b-blue{background:rgba(46,93,147,.12);color:var(--blue)}
.b-grey{background:rgba(0,0,0,.06);color:var(--text-light)}
.card-icon{color:var(--maroon)}
.card-icon svg{width:22px;height:22px}
.card-title{font-family:var(--serif);font-size:18px;line-height:1.2}
.card-sub{font-size:11px;color:var(--text-light);line-height:1.4}
.card-metrics{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.metric-item{min-width:0}
.metric-val{font-size:17px;font-weight:700;line-height:1}
.metric-lbl{font-size:10px;color:var(--text-light);margin-top:2px}
.card-bar-wrap{margin-top:2px}
.card-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.card-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.card-bar-lbl{font-size:10px;color:var(--text-light);margin-top:4px}
.card-insight{font-size:11px;color:var(--text-light);line-height:1.5;flex:1}
.card-footer{font-size:11px;color:var(--maroon);font-weight:600;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.card-empty-msg{font-size:12px;color:var(--text-light);text-align:center;padding:24px 0;font-style:italic;flex:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-box{background:var(--card);border-radius:16px;width:100%;max-width:820px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;overflow:hidden;margin:auto}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 28px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:var(--serif);font-size:24px;line-height:1.2}
.modal-period{display:inline-block;font-size:12px;background:rgba(122,26,20,.08);color:var(--maroon);border-radius:12px;padding:3px 10px;margin-top:6px;font-weight:500}
.modal-close{font-size:22px;color:var(--text-light);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:24px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:22px}
.msec{}
.msec-hd{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text-light);text-transform:uppercase;margin-bottom:10px}
.kpi-row{display:flex;gap:14px;flex-wrap:wrap}
.kpi-chip{background:var(--bg);border-radius:10px;padding:14px 16px;min-width:90px;flex:1}
.kpi-chip.kpi-green{border-left:3px solid var(--green)}
.kpi-chip.kpi-amber{border-left:3px solid var(--amber)}
.kpi-chip.kpi-red{border-left:3px solid var(--red)}
.kpi-chip.kpi-blue{border-left:3px solid var(--blue)}
.kpi-v{font-size:22px;font-weight:700;line-height:1}
.kpi-l{font-size:10px;color:var(--text-light);margin-top:4px}
.kpi-s{font-size:11px;color:var(--text-light);margin-top:2px}
.callout{border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.5}
.callout.green{background:rgba(10,107,111,.08);border-left:3px solid var(--green);color:var(--green)}
.callout.amber{background:rgba(184,105,46,.08);border-left:3px solid var(--amber);color:var(--amber2)}
.callout.red{background:rgba(198,40,40,.08);border-left:3px solid var(--red);color:var(--red)}
.callout.blue{background:rgba(46,93,147,.08);border-left:3px solid var(--blue);color:var(--blue)}
.callout.grey{background:rgba(0,0,0,.04);border-left:3px solid var(--border2);color:var(--text-light)}
.highlight-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.highlight-box{border-radius:8px;padding:14px;font-size:12px;line-height:1.5}
.hl-label{font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.hl-win{background:rgba(10,107,111,.08);color:var(--green)}
.hl-risk{background:rgba(184,105,46,.08);color:var(--amber2)}
.hl-action{background:rgba(122,26,20,.08);color:var(--maroon)}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-light);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,.015)}
.pill-done{background:rgba(10,107,111,.1);color:var(--green);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.pill-pend{background:rgba(184,105,46,.1);color:var(--amber);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.pill-na{background:rgba(0,0,0,.06);color:var(--text-light);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600}
.pill-active{background:rgba(198,40,40,.1);color:var(--red);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600}

/* H-BARS */
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.hbar-lbl{font-size:11px;min-width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;transition:width .4s}
.hbar-val{font-size:11px;font-weight:600;min-width:60px;text-align:right;flex-shrink:0}

/* SUSTAINABILITY */
.sys-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.sys-item{border-radius:8px;padding:14px;border:1px solid var(--border)}
.sys-item.green{border-color:rgba(10,107,111,.3);background:rgba(10,107,111,.04)}
.sys-item.amber{border-color:rgba(184,105,46,.3);background:rgba(184,105,46,.04)}
.sys-item.red{border-color:rgba(198,40,40,.3);background:rgba(198,40,40,.04)}
.sys-name{font-size:11px;font-weight:700;margin-bottom:4px}
.sys-item.green .sys-name{color:var(--green)}
.sys-item.amber .sys-name{color:var(--amber)}
.sys-item.red .sys-name{color:var(--red)}
.sys-status{font-size:12px;margin-bottom:3px}
.sys-note{font-size:11px;color:var(--text-light)}

/* FOOTER */
.dash-footer{text-align:center;padding:16px;font-size:11px;color:var(--text-light);border-top:1px solid var(--border);margin-top:4px}

/* PRINT */
@media print{.nav,.period-bar,.modal-overlay,.loading-overlay{display:none!important}.card{break-inside:avoid}}
@media(max-width:580px){.dept-grid{grid-template-columns:1fr}.highlight-row{grid-template-columns:1fr}.sys-grid{grid-template-columns:1fr}.modal-hd{padding:16px 20px}.modal-body{padding:16px 20px}}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-brand" onclick="goHome()">Nandi Housing</div>
  <div class="nav-crumb" id="navCrumb"></div>
  <div id="navActions" style="display:flex;gap:8px;flex-shrink:0"></div>
</nav>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-step" id="loadingStep">Initialising<span class="ldots"></span></div>
    <div class="loading-sub" id="loadingSub"></div>
  </div>
</div>

<div id="homeView"></div>

<div id="dashView" style="display:none">
  <div class="period-bar" id="periodBar"></div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="dash-footer" id="dashFooter"></div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <span class="modal-period" id="modalPeriod"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ===== CONSTANTS =====
const PERIODS = {
  quarter:[
    {id:'Q3 FY25-26',label:'Q3 FY25-26',sub:'Oct–Dec 2025',months:['Oct 2025','Nov 2025','Dec 2025']},
    {id:'Q4 FY25-26',label:'Q4 FY25-26',sub:'Jan–Mar 2026',months:['Jan 2026','Feb 2026','Mar 2026']},
    {id:'Q1 FY26-27',label:'Q1 FY26-27',sub:'Apr–Jun 2026',months:['Apr 2026','May 2026']},
  ],
  month:[
    {id:'Oct 2025',label:'Oct 2025',months:['Oct 2025']},
    {id:'Nov 2025',label:'Nov 2025',months:['Nov 2025']},
    {id:'Dec 2025',label:'Dec 2025',months:['Dec 2025']},
    {id:'Jan 2026',label:'Jan 2026',months:['Jan 2026']},
    {id:'Feb 2026',label:'Feb 2026',months:['Feb 2026']},
    {id:'Mar 2026',label:'Mar 2026',months:['Mar 2026']},
    {id:'Apr 2026',label:'Apr 2026',months:['Apr 2026']},
    {id:'May 2026',label:'May 2026',months:['May 2026']},
  ],
  year:[
    {id:'FY25-26',label:'FY 2025-26',sub:'Apr 2025 – Mar 2026',months:['Apr 2025','May 2025','Jun 2025','Jul 2025','Aug 2025','Sep 2025','Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026','Mar 2026']},
    {id:'FY26-27 YTD',label:'FY 2026-27 YTD',sub:'Apr – present',months:['Apr 2026','May 2026']},
  ],
};

const DEPTS = {
  fm:{name:'Facility Management',abbr:'FM'},
  dm:{name:'Digital Marketing',abbr:'DM'},
  lr:{name:'Legal & Regulatory',abbr:'L&R'},
};

// ===== STATE =====
let S = {dept:null,period:null,periodMonths:[],mode:'quarter',data:null,loading:false};

// ===== UTILS =====
const nv = v => Number(v)||0;
function fmtNum(v){
  v=Math.round(v); if(v<0) return '-'+fmtNum(-v);
  const s=String(v); if(s.length<=3) return s;
  const l3=s.slice(-3), rest=s.slice(0,-3);
  return rest.replace(/(\d)(?=(\d{2})+(?!\d))/g,'$1,')+','+l3;
}
function fmtR(v,short=false){
  v=nv(v); if(!v) return '₹0';
  if(short){
    if(Math.abs(v)>=1e7) return '₹'+(v/1e7).toFixed(1)+' Cr';
    if(Math.abs(v)>=1e5) return '₹'+(v/1e5).toFixed(2).replace(/\.?0+$/,'')+' L';
    if(Math.abs(v)>=1000) return '₹'+Math.round(v/1000)+'K';
    return '₹'+Math.round(v);
  }
  return '₹'+fmtNum(v);
}
function pct(a,b){return b?Math.round(nv(a)/nv(b)*100):0;}
function safe(v,def='—'){return (v===undefined||v===null||v==='') ? def : v;}
function ms(m){const map={'Jan 2026':'Jan','Feb 2026':'Feb','Mar 2026':'Mar','Apr 2026':'Apr','May 2026':'May','Jun 2026':'Jun','Oct 2025':'Oct','Nov 2025':'Nov','Dec 2025':'Dec','Jul 2026':'Jul','Aug 2026':'Aug','Sep 2026':'Sep'};return map[m]||String(m).split(' ')[0];}

// ===== CHARTS =====
function sparkLine(values,color='#7a1a14',w=280,h=55){
  const v=(values||[]).map(x=>nv(x));
  if(v.length<2) return `<div style="height:${h}px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-light)">No trend data</div>`;
  const mx=Math.max(...v,1),mn=Math.min(...v,0),rng=mx-mn||1;
  const pts=v.map((val,i)=>{const x=10+(i/(v.length-1))*(w-20);const y=h-8-((val-mn)/rng)*(h-16);return `${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
  const dots=v.map((val,i)=>{const x=10+(i/(v.length-1))*(w-20);const y=h-8-((val-mn)/rng)*(h-16);return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}"/>`;}).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;overflow:visible"><polyline fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" points="${pts}"/>${dots}</svg>`;
}
function colBars(labels,datasets,h=80){
  if(!labels||!labels.length) return '';
  const nb=datasets.length, w=Math.max(280,labels.length*44*nb);
  const bw=Math.floor((w-20)/labels.length/(nb+0.5))-2;
  const colors=['#7a1a14','#0a6b6f','#b8692e','#2e5d93'];
  let bars='',xlbls='';
  labels.forEach((lbl,i)=>{
    const gx=10+i*((w-20)/labels.length);
    const mx=Math.max(...datasets.flatMap(d=>d.data),1);
    datasets.forEach((ds,di)=>{
      const bh=Math.max(2,(nv(ds.data[i])/mx)*(h-15));
      const x=gx+di*(bw+2), y=h-12-bh;
      bars+=`<rect x="${x.toFixed(0)}" y="${y.toFixed(0)}" width="${bw}" height="${bh.toFixed(0)}" fill="${colors[di%4]}" rx="2"/>`;
    });
    xlbls+=`<text x="${(gx+(nb*(bw+2))/2).toFixed(0)}" y="${h}" text-anchor="middle" font-size="9" fill="#999">${lbl}</text>`;
  });
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${w} ${h+4}" style="width:100%;min-width:200px;height:${h+4}px">${bars}${xlbls}</svg></div>`;
}
function hBarRow(label,val,max,color='#7a1a14',valStr){
  const p=Math.min(100,Math.round(nv(val)/Math.max(nv(max),1)*100));
  return `<div class="hbar-row"><span class="hbar-lbl">${label}</span><div class="hbar-track"><div class="hbar-fill" style="width:${p}%;background:${color}"></div></div><span class="hbar-val">${valStr!==undefined?valStr:val}</span></div>`;
}
function donutSvg(p,color='#7a1a14',size=70){
  p=Math.min(100,Math.max(0,nv(p)));
  const r=size/2-6,circ=2*Math.PI*r,fill=(p/100)*circ,cx=size/2,cy=size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="7"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-dasharray="${fill.toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/><text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="${size>70?14:11}" font-weight="700" fill="${color}">${p}%</text></svg>`;
}
function pBar(p,color){return `<div class="card-bar"><div class="card-bar-fill" style="width:${Math.min(100,nv(p))}%;background:${color||'var(--maroon)'}"></div></div>`;}

function hlBox(d){
  const h=d.highlights||{};
  if(!h.win&&!h.risk&&!h.action) return '';
  return `<div class="msec"><div class="msec-hd">Period Highlights</div><div class="highlight-row">
    ${h.win?`<div class="highlight-box hl-win"><div class="hl-label">Win</div>${h.win}</div>`:''}
    ${h.risk?`<div class="highlight-box hl-risk"><div class="hl-label">Risk</div>${h.risk}</div>`:''}
    ${h.action?`<div class="highlight-box hl-action"><div class="hl-label">Action</div>${h.action}</div>`:''}
  </div></div>`;
}

// ===== CARD BUILDER =====
function buildCard(num,title,sub,badge,bc,iconSvg,metrics,progress,insight,onclick){
  const mH=(metrics||[]).map(m=>`<div class="metric-item"><div class="metric-val">${m.val}</div><div class="metric-lbl">${m.lbl}</div></div>`).join('');
  const pH=progress?`<div class="card-bar-wrap">${pBar(progress.pct,progress.color)}<div class="card-bar-lbl">${progress.label}</div></div>`:'';
  return `<div class="card" onclick="${onclick}">
    <div class="card-hd"><div class="card-num">${num}</div><span class="badge ${bc}">${badge}</span></div>
    <div class="card-icon">${iconSvg}</div>
    <h3 class="card-title">${title}</h3>
    <p class="card-sub">${sub}</p>
    <div class="card-metrics">${mH}</div>
    ${pH}
    ${insight?`<p class="card-insight">${insight}</p>`:''}
    <div class="card-footer">View details &rarr;</div>
  </div>`;
}

function buildEmptyCards(dept){
  const count=dept==='lr'?5:6;
  return Array.from({length:count},(_,i)=>`
    <div class="card card-empty">
      <div class="card-hd"><div class="card-num">0${i+1}</div><span class="badge b-grey">—</span></div>

function buildCards(dept,data){
  if(!data) return buildEmptyCards(dept);
  if(dept==='fm') return fmCards(data);

  if(dept==='lr') return lrCards(data);
  return '';
}

// ===== MODAL SYSTEM =====
function openModal(title,periodLabel,content){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalPeriod').textContent=periodLabel||'';
  document.getElementById('modalBody').innerHTML=content;
  document.getElementById('modalOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.currentTarget!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
}

// ===== LOADING =====
function showLoading(step,sub){
  document.getElementById('loadingStep').innerHTML=step;
  document.getElementById('loadingSub').textContent=sub||'';
  document.getElementById('loadingOverlay').style.display='flex';
}
function hideLoading(){document.getElementById('loadingOverlay').style.display='none';}

// ===== CACHE =====
function cKey(dept,period){return `fenxi_v3_${dept}_${period}`;}
function saveCache(dept,period,data){try{localStorage.setItem(cKey(dept,period),JSON.stringify({data,ts:Date.now()}));}catch(e){}}
function loadCache(dept,period){
  try{const r=localStorage.getItem(cKey(dept,period));if(!r)return null;const{data,ts}=JSON.parse(r);if(Date.now()-ts>24*3600*1000)return null;return data;}catch(e){return null;}
}

// ===== API =====
async function fetchSheets(dept){
  const r=await fetch(`/api/sheets?dept=${dept}`);
  if(!r.ok) throw new Error(`Sheets error: ${r.status}`);
  return r.json();
}
async function analyzeData(rawSheets,dept,period,periodMonths){
  const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rawSheets,dept,period,periodMonths})});
  if(!r.ok) throw new Error(`Analyze error: ${r.status}`);
  return r.json();
}

// ===== NAVIGATION =====
function goHome(){
  S.dept=null;S.data=null;S.period=null;
  document.getElementById('homeView').style.display='';
  document.getElementById('dashView').style.display='none';
  updateNav();
  renderHome();
}

function selectDept(dept){
  S.dept=dept;S.data=null;S.period=null;S.mode='quarter';
  document.getElementById('homeView').style.display='none';
  document.getElementById('dashView').style.display='';
  updateNav();
  renderPeriodBar();
  renderCards();
  renderFooter();
}

function updateNav(){
  const crumb=document.getElementById('navCrumb');
  const acts=document.getElementById('navActions');
  if(!S.dept){crumb.innerHTML='';acts.innerHTML='';return;}
  const d=DEPTS[S.dept];
  crumb.innerHTML=`<button class="nav-back" onclick="goHome()">&#8592; Home</button>
    <span class="sep">›</span><span class="active">${d.name}</span>
    ${S.period?`<span class="sep">›</span><span>${S.period}</span>`:''}`;
  acts.innerHTML=S.data?`<button class="nav-export" onclick="window.print()">Export PDF</button>`:'';
}

// ===== PERIOD BAR =====
function selectMode(mode){S.mode=mode;S.period=null;S.periodMonths=[];renderPeriodBar();}
function selectPeriod(pid){
  const all=[...PERIODS.quarter,...PERIODS.month,...PERIODS.year];
  const p=all.find(x=>x.id===pid);
  S.period=pid;S.periodMonths=p?.months||[];
  renderPeriodBar();updateNav();
}

function renderPeriodBar(){
  const pills=PERIODS[S.mode]||[];
  const modeH=['quarter','month','year'].map(m=>
    `<button class="mode-tab ${S.mode===m?'active':''}" onclick="selectMode('${m}')">${m==='quarter'?'Quarters':m==='month'?'Months':'Full Year'}</button>`
  ).join('');
  const pillsH=pills.map(p=>{
    const active=S.period===p.id;
    const cached=loadCache(S.dept,p.id);
    return `<button class="period-pill ${active?'active':''}" onclick="selectPeriod('${p.id}')">${p.label}${p.sub?`<span class="pill-sub">${p.sub}</span>`:''}${cached&&!active?'<span style="font-size:9px;opacity:.55"> cached</span>':''}</button>`;
  }).join('');
  const hasCached=S.period&&loadCache(S.dept,S.period);
  document.getElementById('periodBar').innerHTML=`
    <div class="mode-tabs">${modeH}</div>
    <div class="period-pills" style="flex:1">${pillsH}</div>
    <button class="gen-btn ${hasCached?'cached':''}" id="genBtn" onclick="generate()" ${!S.period?'disabled':''}>
      ${hasCached?'Refresh':'Generate'}
    </button>`;
}

// ===== GENERATE =====
async function generate(){
  if(!S.dept||!S.period) return;
  S.loading=true;
  try{
    showLoading(`Connecting to Sheets<span class="ldots"></span>`,`Fetching ${DEPTS[S.dept].name} data`);
    const rawSheets=await fetchSheets(S.dept);
    showLoading(`Analysing with AI<span class="ldots"></span>`,`Building insights for ${S.period}`);
    const data=await analyzeData(rawSheets,S.dept,S.period,S.periodMonths);
    S.data=data;
    saveCache(S.dept,S.period,data);
    updateNav();renderPeriodBar();renderCards();renderFooter();
  }catch(err){
    alert('Error: '+err.message+'\n\nEnsure Google Sheets are shared with the service account and Vercel env vars are set (GOOGLE_SHEET_ID_FM, GOOGLE_SHEET_ID_DM, GOOGLE_SHEET_ID_LR).');
  }finally{S.loading=false;hideLoading();}
}

function renderCards(){document.getElementById('cardGrid').innerHTML=buildCards(S.dept,S.data);}
function renderFooter(){
  const ft=document.getElementById('dashFooter');
  if(S.data?.fetchTime){const t=new Date(S.data.fetchTime).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});ft.innerHTML=`Data from Google Sheets · ${t} · AI analysis by Claude Haiku`;}
  else ft.innerHTML=S.dept?`${DEPTS[S.dept].name} — select a period and click Generate`:'';
}
